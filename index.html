<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>REAV SMART</title>

<!-- SUPABASE CDN -->
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<style>
:root{
  --bg:#05070c;
  --panel:#0b1020;
  --card:#0a0f1a;
  --text:#e6edf6;
  --muted:#9aa7b2;
  --border:#1f2a44;
  --btn:#2563eb;
  --btn2:#475569;
  --danger:#dc2626;
  --success:#16a34a;
  --warn:#f59e0b;

  --mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
  --sans: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;
}

*{ box-sizing:border-box; }

body{
  margin:0;
  padding:14px;
  font-family: var(--sans);
  background: radial-gradient(1200px 700px at 30% 0%, #0c1534 0%, var(--bg) 60%);
  color: var(--text);
}

.wrap{ max-width: 980px; margin: 0 auto; }

h2{ margin:0 0 6px 0; letter-spacing:.5px; }
.sub{ color:var(--muted); font-size:12px; margin-bottom:12px; }

.card{
  background: rgba(11,16,32,.82);
  border: 1px solid rgba(31,42,68,.85);
  border-radius: 14px;
  padding: 12px;
  box-shadow: 0 8px 24px rgba(0,0,0,.25);
  margin-bottom: 12px;
  backdrop-filter: blur(10px);
}

label.title{
  display:block;
  font-weight:900;
  margin: 10px 0 6px;
  letter-spacing:.4px;
}

input, textarea, select{
  width:100%;
  background: rgba(10,15,26,.92);
  color: var(--text);
  border: 1px solid rgba(31,42,68,.9);
  border-radius: 12px;
  padding: 10px 12px;
  font-size: 14px;
  outline: none;
}

textarea{
  min-height: 70px;
  resize: vertical;
  font-family: var(--mono);
}

.small{
  font-size:12px;
  color:var(--muted);
  margin-top:6px;
}

.row{
  display:flex;
  gap:10px;
  flex-wrap: wrap;
  align-items: center;
}

.grow{ flex:1; min-width: 240px; }

button{
  border: 0;
  border-radius: 12px;
  padding: 10px 12px;
  font-weight: 900;
  cursor: pointer;
  color: #fff;
  background: var(--btn);
}
button.secondary{ background: var(--btn2); }
button.danger{ background: var(--danger); }
button.success{ background: var(--success); }
button.warn{ background: var(--warn); color:#111827; }
button:active{ transform: translateY(1px); }

hr.sep{
  border:0;
  border-top:1px dashed rgba(31,42,68,.9);
  margin: 12px 0;
}

/* ===== CONDUTA RESPONSIVA ===== */
.conduta-checklist{
  display:flex;
  flex-direction:column;
  gap:8px;
  margin-top: 6px;
}
.conduta-checklist label{
  display:flex;
  align-items:center;
  gap:12px;
  padding:12px;
  border:1px solid rgba(31,42,68,.9);
  border-radius:12px;
  background: rgba(10,15,26,.92);
  cursor:pointer;
  font-size:15px;
  line-height:1.2;
}
.conduta-checklist input{
  width:22px;
  height:22px;
  accent-color: #60a5fa;
}
.conduta-checklist label.checked{
  border-color: rgba(96,165,250,.8);
  box-shadow: 0 0 0 3px rgba(96,165,250,.12) inset;
}

@media(min-width:768px){
  .conduta-checklist{
    display:grid;
    grid-template-columns:repeat(2, 1fr);
  }
}

/* ===== LISTA ===== */
.patient{
  background: rgba(10,15,26,.92);
  border: 1px solid rgba(31,42,68,.9);
  border-radius: 14px;
  padding: 12px;
  margin-bottom: 10px;
}

.patient-top{
  display:flex;
  justify-content:space-between;
  gap:12px;
  align-items:flex-start;
  flex-wrap: wrap;
}

.pname{
  font-size: 18px;
  font-weight: 950;
  letter-spacing: .3px;
}

.pname.strike{ text-decoration: line-through; opacity: .65; }

.meta{
  color: var(--muted);
  font-size: 12px;
  margin-top: 6px;
  line-height: 1.4;
}

.cd{
  display:inline-block;
  padding: 3px 8px;
  border-radius: 10px;
  font-weight: 950;
  margin-left: 6px;
}
.cd-ok{ background: rgba(22,163,74,.15); color: #86efac; }
.cd-warn{ background: rgba(245,158,11,.15); color: #fde68a; }
.cd-late{ background: rgba(239,68,68,.16); color: #fecaca; }

.overdue{
  border-color: rgba(239,68,68,.75);
  box-shadow: 0 0 0 3px rgba(239,68,68,.12) inset;
}

.actions{
  display:flex;
  gap:8px;
  flex-wrap: wrap;
  justify-content:flex-end;
}

.actions button{
  padding: 9px 10px;
  border-radius: 12px;
  font-size: 12px;
  font-weight: 950;
}

/* ===== TXT BOX ===== */
#exportArea{ display:none; }
.export-box{
  min-height: 280px;
  font-family: var(--mono);
}

@media(max-width:420px){
  body{ padding: 10px; }
  .grow{ min-width: 100%; }
  .actions{ justify-content: flex-start; }
}
</style>
</head>

<body>
<div class="wrap">
  <h2>REAV SMART</h2>
  <div class="sub">Multi-dispositivo (Supabase) • Export TXTBOX • Dark mode</div>

  <!-- FORM -->
  <div class="card">
    <label class="title">#ANAMNESE</label>
    <input id="qp" placeholder="QUEIXA PRINCIPAL">
    <textarea id="hda" placeholder="HDA"></textarea>

    <label class="title">#ANTECEDENTES</label>
    <textarea id="antecedentes"></textarea>

    <label class="title">#SINAIS VITAIS</label>
    <textarea id="sv"></textarea>

    <label class="title">#EXAME FÍSICO</label>
    <textarea id="ef"></textarea>

    <label class="title">#HIPÓTESE DIAGNÓSTICA</label>
    <textarea id="hd" placeholder="HD (1- ... 2- ...)"></textarea>

    <!-- ✅ CONDUTA POR ÚLTIMO -->
    <label class="title">#CONDUTA</label>
    <div class="conduta-checklist" id="condutaChecklist"></div>
    <textarea id="condutaLivre" placeholder="Conduta livre (opcional)..."></textarea>

    <hr class="sep">

    <div class="row">
      <select id="cor" class="grow">
        <option value="red">🔴 10 min</option>
        <option value="orange">🟠 30 min</option>
        <option value="yellow" selected>🟡 60 min</option>
        <option value="green">🟢 120 min</option>
      </select>

      <button id="btnSalvar" class="grow">Salvar</button>
      <button id="btnLimpar" class="secondary">Limpar</button>
    </div>

    <div class="small" id="statusLinha">Status: pronto</div>
  </div>

  <!-- LISTA -->
  <div class="card">
    <div class="row" style="justify-content:space-between;">
      <b>Atendimentos</b>
      <span class="small" id="countPacientes">(0)</span>
    </div>
    <div id="lista"></div>
  </div>

  <!-- TXTBOX -->
  <div class="card" id="exportArea">
    <div class="row" style="justify-content:space-between;">
      <b>TXT BOX</b>
      <div class="row">
        <button id="btnFecharExport" class="secondary">Fechar</button>
      </div>
    </div>
    <textarea id="exportText" class="export-box"></textarea>
    <div class="small">Dica: selecione e copie manualmente.</div>
  </div>

  <audio id="alertSound">
    <source src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg">
  </audio>
</div>

<script>
/* =========================
   SUPABASE CONFIG (como você enviou)
========================= */
const SUPABASE_URL = "https://qrvlpupxzvqvwcgwwamr.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFydmxwdXB4enZxdndjZ3d3YW1yIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIzNTE1NjUsImV4cCI6MjA4NzkyNzU2NX0.1k1P_IviJLaHvBK79jpUvm1uTrcLY01umYJsGerLq2Y";

const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

/* =========================
   STATE
========================= */
let pacientes = [];
let realtimeChannel = null;
const alarmTimers = {}; // por id
let titleBlink = null;

const $ = (id) => document.getElementById(id);
function nowISO(){ return new Date().toISOString(); }
function hhmm(d){ return d.toLocaleTimeString([], {hour:"2-digit", minute:"2-digit"}); }

function setStatus(t){ $("statusLinha").textContent = "Status: " + t; }

function escapeHtml(str){
  return (str ?? "").toString()
    .replaceAll("&","&amp;").replaceAll("<","&lt;")
    .replaceAll(">","&gt;").replaceAll('"',"&quot;")
    .replaceAll("'","&#039;");
}

/* =========================
   DEFAULTS (pré-preenchidos)
========================= */
function ensureDefaults(){
  if(!$("antecedentes").value.trim()){
    $("antecedentes").value =
`Comorbidades:
MUC:
Alergia:
Cirurgias prévias:`;
  }

  if(!$("sv").value.trim()){
    $("sv").value = "FC:  bpm | PA:  mmHG | SatO2:  % | FR:  irpm";
  }

  if(!$("ef").value.trim()){
    $("ef").value =
`GERAL: BOM ESTADO GERAL, LÚCIDO, ORIENTADO, HIDRATADO, CORADO, AFEBRIL.
AR: MV PRESENTE BILATERALMENTE, SEM RUÍDOS ADVENTÍCIOS.
ACV: RCR EM 2T, SEM SOPROS.
ABD: PLANO, FLÁCIDO, INDOLOR.
NEURO: SEM DÉFICITS FOCAIS.`;
  }
}

/* =========================
   CONDUTA (ordenável por regra)
========================= */
const CONDUTA_ITEMS = [
  { id:"sint",  label:"Sintomáticos", order:1 },
  { id:"lab",   label:"Exames laboratoriais", order:2 },
  { id:"img",   label:"Exames de imagem", order:3 },
  { id:"reav",  label:"Reavaliação", order:4 },
  { id:"inter", label:"Internação", order:5 },
  { id:"alta",  label:"Alta após atendimento", order:6 },
  { id:"rxdom", label:"Prescrição para uso domiciliar", order:7 },
  { id:"enc",   label:"Encaminhamento", order:8 },
];

function buildCondutaChecklist(){
  const wrap = $("condutaChecklist");
  wrap.innerHTML = "";

  CONDUTA_ITEMS.forEach(item=>{
    const lbl = document.createElement("label");
    lbl.setAttribute("data-id", item.id);
    lbl.innerHTML = `<input type="checkbox" id="cd_${item.id}"><span>${item.label}</span>`;
    wrap.appendChild(lbl);

    const cb = lbl.querySelector("input");
    cb.addEventListener("change", ()=>{
      lbl.classList.toggle("checked", cb.checked);
    });
  });
}

function getCondutaSelecionada(){
  const selected = [];
  for(const it of CONDUTA_ITEMS){
    const cb = document.getElementById("cd_"+it.id);
    if(cb && cb.checked){
      selected.push(it);
    }
  }
  selected.sort((a,b)=>a.order-b.order);
  return selected.map(x=>x.label);
}

/* =========================
   TIMER / REAV
========================= */
function intervaloPorCor(c){
  if(c==="red") return 10;
  if(c==="orange") return 30;
  if(c==="yellow") return 60;
  if(c==="green") return 120;
  return 60;
}

function countdownInfo(proxISO){
  const prox = new Date(proxISO).getTime();
  const diff = prox - Date.now();
  if(diff <= 0) return { text:"ATRASADO", cls:"cd-late", overdue:true, diff };
  const min = Math.floor(diff/60000);
  const sec = Math.floor((diff%60000)/1000);
  const cls = diff < 10*60000 ? "cd-warn" : "cd-ok";
  return { text:`${min}m ${sec}s`, cls, overdue:false, diff };
}

function startAlarm(id, nome){
  if(alarmTimers[id]) return;
  const audio = $("alertSound");
  try{ audio.play(); }catch(e){}
  alarmTimers[id] = setInterval(()=>{ try{ audio.play(); }catch(e){} }, 15000);
  startBlink();
}

function stopAlarm(id){
  if(!alarmTimers[id]) return;
  clearInterval(alarmTimers[id]);
  delete alarmTimers[id];
  if(Object.keys(alarmTimers).length === 0) stopBlink();
}

function startBlink(){
  if(titleBlink) return;
  titleBlink = setInterval(()=>{
    document.title = (document.title === "🚨 REAV ATRASADA") ? "REAV SMART" : "🚨 REAV ATRASADA";
  }, 900);
}
function stopBlink(){
  if(titleBlink){
    clearInterval(titleBlink);
    titleBlink = null;
  }
  document.title = "REAV SMART";
}

/* =========================
   DATABASE
========================= */
async function carregarPacientes(){
  const { data, error } = await supabaseClient
    .from("pacientes")
    .select("*")
    .order("created_at", { ascending:false });

  if(error){
    console.error(error);
    setStatus("erro ao carregar (console)");
    return;
  }

  pacientes = (data || []).map(row=>{
    const dj = row.dados_json || {};
    return {
      id: row.id,
      name: row.name ?? dj.nome ?? "SEM QP",
      hd: row.hd ?? dj.hd ?? "",
      dados_json: dj,
      alta: !!row.alta,
      alta_at: row.alta_at || null,
      created_at: row.created_at || dj.created_at || nowISO(),
      prox: dj.prox || row.prox || dj.prox,
    };
  });

  render();
}

async function salvarPacienteBanco(payload){
  // INSERT
  const { data, error } = await supabaseClient
    .from("pacientes")
    .insert([{
      name: payload.nome,
      hd: payload.hd,
      dados_json: payload,
      alta: payload.alta || false
    }])
    .select();

  if(error){
    console.error(error);
    setStatus("erro ao salvar (console)");
    return null;
  }
  return data?.[0]?.id || null;
}

async function deletarPacienteBanco(id){
  const { error } = await supabaseClient.from("pacientes").delete().eq("id", id);
  if(error) console.error(error);
}

async function darAltaBanco(id){
  const { error } = await supabaseClient
    .from("pacientes")
    .update({ alta:true, alta_at: nowISO() })
    .eq("id", id);
  if(error) console.error(error);
}

/* =========================
   CRUD
========================= */
async function addPaciente(){
  const nome = ($("qp").value || "").trim() || "SEM QP";
  const hda = ($("hda").value || "").trim();
  const antecedentes = ($("antecedentes").value || "").trim();
  const sv = ($("sv").value || "").trim();
  const ef = ($("ef").value || "").trim();
  const hd = ($("hd").value || "").trim();
  const cor = $("cor").value;

  const condLista = getCondutaSelecionada();
  const condLivre = ($("condutaLivre").value || "").trim();
  const condutaFinal = [...condLista];
  if(condLivre) condutaFinal.push(condLivre);

  const created = nowISO();
  const prox = new Date(Date.now() + intervaloPorCor(cor)*60000).toISOString();

  const payload = {
    nome,
    qp: nome,
    hda,
    antecedentes,
    sv,
    ef,
    hd,
    conduta: condutaFinal,      // array de strings (já ordenado)
    conduta_livre: condLivre,
    cor,
    created_at: created,
    prox,
    alta: false,
    alta_at: null
  };

  setStatus("salvando...");
  const newId = await salvarPacienteBanco(payload);
  if(!newId) return;

  limparForm();
  setStatus("salvo");
  await carregarPacientes();
}

function limparForm(){
  $("qp").value = "";
  $("hda").value = "";
  $("hd").value = "";
  $("cor").value = "yellow";
  $("condutaLivre").value = "";

  // desmarca checklist
  CONDUTA_ITEMS.forEach(it=>{
    const cb = document.getElementById("cd_"+it.id);
    if(cb) cb.checked = false;
    const lbl = document.querySelector(`[data-id="${it.id}"]`);
    if(lbl) lbl.classList.remove("checked");
  });

  // mantém defaults em antecedentes/sv/ef (não apaga)
  ensureDefaults();
}

/* =========================
   EXPORT
========================= */
function montarTextoExport(p){
  const dj = p.dados_json || {};
  const qp = dj.qp || p.name || "-";
  const hda = dj.hda || "-";
  const ant = dj.antecedentes || "-";
  const sv = dj.sv || "-";
  const ef = dj.ef || "-";
  const hd = dj.hd || p.hd || "-";

  const condArr = Array.isArray(dj.conduta) ? dj.conduta : [];
  const condTxt = condArr.length ? condArr.join(", ") : "-";

  // ordem final pedida:
  // QP + HDA + ANTECEDENTES + SV + EF + HD + CONDUTA
  return `#ANAMNESE
QUEIXA PRINCIPAL: ${qp}
HDA: ${hda}

---
#ANTECEDENTES
${ant}

---
#SINAIS VITAIS
${sv}

---
#EXAME FÍSICO
${ef}

---
#HIPÓTESE DIAGNÓSTICA
${hd}

---
#CONDUTA
${condTxt}`;
}

function showExport(text){
  $("exportText").value = text;
  $("exportArea").style.display = "block";
  window.scrollTo({ top: document.body.scrollHeight, behavior: "smooth" });
}

$("btnFecharExport").addEventListener("click", ()=>{
  $("exportArea").style.display = "none";
});

/* =========================
   LIST ACTIONS
========================= */
async function acaoAlta(id){
  stopAlarm(id);
  await darAltaBanco(id);
  await carregarPacientes();
}

async function acaoDelete(id){
  stopAlarm(id);
  await deletarPacienteBanco(id);
  await carregarPacientes();
}

function acaoExport(id){
  const p = pacientes.find(x=>x.id===id);
  if(!p) return;
  showExport(montarTextoExport(p));
}

/* =========================
   RENDER
========================= */
function render(){
  $("countPacientes").textContent = `(${pacientes.length})`;
  const div = $("lista");
  div.innerHTML = "";

  // ordenar: atrasados (ativos) primeiro, depois por prox
  const sorted = [...pacientes].sort((a,b)=>{
    const ao = !a.alta && (new Date(a.dados_json?.prox || a.prox).getTime() <= Date.now());
    const bo = !b.alta && (new Date(b.dados_json?.prox || b.prox).getTime() <= Date.now());
    if(ao !== bo) return ao ? -1 : 1;
    return new Date(a.dados_json?.prox || a.prox).getTime() - new Date(b.dados_json?.prox || b.prox).getTime();
  });

  let anyOverdue = false;

  sorted.forEach(p=>{
    const dj = p.dados_json || {};
    const proxISO = dj.prox || p.prox || nowISO();
    const prox = new Date(proxISO);
    const cd = countdownInfo(proxISO);

    const overdueActive = (!p.alta) && cd.overdue;
    if(overdueActive) anyOverdue = true;

    if(overdueActive) startAlarm(p.id, p.name);
    else stopAlarm(p.id);

    const card = document.createElement("div");
    card.className = "patient" + (overdueActive ? " overdue" : "");

    const nameCls = p.alta ? "pname strike" : "pname";

    card.innerHTML = `
      <div class="patient-top">
        <div>
          <div class="${nameCls}">${escapeHtml(p.name)}</div>
          <div class="meta">
            Próx reav: <b>${hhmm(prox)}</b>
            ${!p.alta ? ` <span class="cd ${cd.cls}">${cd.text}</span>` : ``}
            <br>
            HD: ${escapeHtml(p.hd || dj.hd || "-")}
          </div>
        </div>

        <div class="actions">
          <button class="secondary" onclick="acaoExport('${p.id}')">Exportar</button>
          ${p.alta ? `` : `<button class="success" onclick="acaoAlta('${p.id}')">Alta</button>`}
          <button class="danger" onclick="acaoDelete('${p.id}')">Deletar</button>
        </div>
      </div>
    `;

    div.appendChild(card);
  });

  if(anyOverdue) startBlink();
  else if(Object.keys(alarmTimers).length === 0) stopBlink();
}

/* =========================
   REALTIME
========================= */
function initRealtime(){
  if(realtimeChannel) return;

  realtimeChannel = supabaseClient
    .channel("realtime")
    .on("postgres_changes",
      { event:"*", schema:"public", table:"pacientes" },
      ()=> carregarPacientes()
    )
    .subscribe();
}

/* =========================
   BOOT
========================= */
$("btnSalvar").addEventListener("click", addPaciente);
$("btnLimpar").addEventListener("click", ()=>{ limparForm(); setStatus("limpo"); });

buildCondutaChecklist();
ensureDefaults();

initRealtime();
carregarPacientes();

// atualiza contagem regressiva / alarmes
setInterval(render, 1000);
</script>
</body>
</html>
