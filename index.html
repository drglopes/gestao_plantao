<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>REAV SMART</title>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#0f172a;
  --card:#1e293b;
  --text:#e2e8f0;
  --muted:#94a3b8;
  --btn:#2563eb;
  --danger:#dc2626;
  --border:#334155;
}

body{
  font-family:'Inter',sans-serif;
  background:var(--bg);
  color:var(--text);
  padding:20px;
  margin:0;
}

.card{
  background:var(--card);
  padding:15px;
  border-radius:12px;
  margin-bottom:15px;
  border:1px solid var(--border);
}

input, textarea, select{
  width:100%;
  margin:6px 0;
  padding:10px;
  background:#0f172a;
  color:var(--text);
  border:1px solid var(--border);
  border-radius:10px;
}

textarea{
  min-height:80px;
}

button{
  padding:8px 12px;
  margin:4px 4px 4px 0;
  cursor:pointer;
  border:none;
  border-radius:8px;
  background:var(--btn);
  color:white;
}

button.danger{
  background:var(--danger);
}

.export-box{
  margin-top:10px;
  height:250px;
  background:#0f172a;
  color:#e2e8f0;
  border:1px solid var(--border);
  border-radius:10px;
  padding:10px;
  font-family:monospace;
}
</style>
</head>

<body>

<h2>REAV SMART</h2>

<div class="card">
  <input id="qp" placeholder="Queixa principal">
  <textarea id="hda" placeholder="HDA"></textarea>

  <!-- NOVO CAMPO ANTECEDENTES -->
  <textarea id="ant" placeholder="Antecedentes"></textarea>

  <!-- NOVO CAMPO SINAIS VITAIS -->
  <textarea id="sv" placeholder="Sinais vitais"></textarea>

  <!-- EXAME FÍSICO -->
  <textarea id="ef">GERAL: BOM ESTADO GERAL, LÚCIDO, ORIENTADO, HIDRATADO, CORADO, AFEBRIL.
AR: MV PRESENTE BILATERALMENTE, SEM RUÍDOS ADVENTÍCIOS.
ACV: RCR EM 2T, SEM SOPROS.
ABD: PLANO, FLÁCIDO, INDOLOR.
NEURO: SEM DÉFICITS FOCAIS.</textarea>

  <textarea id="hd" placeholder="Hipótese diagnóstica"></textarea>

  <!-- NOVO CAMPO CONDUTA -->
  <textarea id="conduta" placeholder="Conduta"></textarea>

  <select id="cor">
    <option value="red">🔴 10 min</option>
    <option value="orange">🟠 30 min</option>
    <option value="yellow" selected>🟡 60 min</option>
    <option value="green">🟢 120 min</option>
  </select>

  <button onclick="addPaciente()">Salvar</button>
</div>

<div id="lista"></div>

<textarea id="exportBox" class="export-box" style="display:none;"></textarea>

<script>

/* =========================
   SUPABASE CONFIG
========================= */

const SUPABASE_URL = "https://qrvlpupxzvqvwcgwwamr.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFydmxwdXB4enZxdndjZ3d3YW1yIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIzNTE1NjUsImV4cCI6MjA4NzkyNzU2NX0.1k1P_IviJLaHvBK79jpUvm1uTrcLY01umYJsGerLq2Y";

const { createClient } = supabase;
const db = createClient(SUPABASE_URL, SUPABASE_KEY);

/* =========================
   STATE
========================= */

let pacientes = [];

function nowISO(){ return new Date().toISOString(); }

function intervaloPorCor(c){
  if(c==="red") return 10;
  if(c==="orange") return 30;
  if(c==="yellow") return 60;
  if(c==="green") return 120;
  return 60;
}

/* =========================
   DATABASE
========================= */

async function carregar(){
  const { data } = await db
    .from("pacientes")
    .select("*")
    .order("created_at",{ascending:false});

  pacientes = data || [];
  render();
}

async function salvar(p){
  if(p.id){
    await db.from("pacientes")
      .update({ dados_json:p })
      .eq("id",p.id);
  } else {
    const { data } = await db.from("pacientes")
      .insert([{ dados_json:p }])
      .select();
    p.id = data[0].id;
  }
}

/* =========================
   CRUD
========================= */

async function addPaciente(){

  const novo = {
    nome: document.getElementById("qp").value.trim() || "SEM QP",
    qp: document.getElementById("qp").value.trim(),
    hda: document.getElementById("hda").value.trim(),
    antecedentes: document.getElementById("ant").value.trim(),
    sv: document.getElementById("sv").value.trim(),
    ef: document.getElementById("ef").value.trim(),
    hd: document.getElementById("hd").value.trim(),
    conduta: document.getElementById("conduta").value.trim(),
    cor: document.getElementById("cor").value,
    created_at: nowISO(),
    prox: new Date(Date.now() + intervaloPorCor(document.getElementById("cor").value)*60000).toISOString()
  };

  await salvar(novo);
  limparForm();
  await carregar();
}

async function remover(id){
  await db.from("pacientes").delete().eq("id",id);
  await carregar();
}

/* =========================
   EXPORT PADRÃO
========================= */

function exportarPaciente(obj){

  const texto = `#ANAMNESE
QUEIXA PRINCIPAL: ${obj.qp}

HDA:
${obj.hda}

---
#ANTECEDENTES
${obj.antecedentes || "-"}

---
#SINAIS VITAIS
${obj.sv || "-"}

---
#EXAME FÍSICO
${obj.ef}

---
#HIPÓTESE DIAGNÓSTICA
${obj.hd}

---
#CONDUTA
${obj.conduta || "-"}`;

  const box = document.getElementById("exportBox");
  box.style.display="block";
  box.value = texto;
  box.select();
}

/* =========================
   RENDER
========================= */

function render(){

  const div = document.getElementById("lista");
  div.innerHTML="";

  pacientes.forEach(p=>{

    const obj = p.dados_json || p;

    const card = document.createElement("div");
    card.className="card";

    card.innerHTML = `
      <b>${obj.nome}</b><br>
      HD: ${obj.hd || "-"}<br>
      Próx reav: ${new Date(obj.prox).toLocaleTimeString()}<br>
      <button onclick='exportarPaciente(${JSON.stringify(obj)})'>Exportar</button>
      <button class="danger" onclick="remover('${p.id}')">Remover</button>
    `;

    div.appendChild(card);
  });
}

function limparForm(){
  document.getElementById("qp").value="";
  document.getElementById("hda").value="";
  document.getElementById("ant").value="";
  document.getElementById("sv").value="";
  document.getElementById("hd").value="";
  document.getElementById("conduta").value="";
}

/* =========================
   REALTIME
========================= */

db.channel("realtime")
  .on("postgres_changes",
    { event:"*", schema:"public", table:"pacientes" },
    ()=> carregar()
  )
  .subscribe();

/* =========================
   INIT
========================= */

carregar();

</script>

</body>
</html>
