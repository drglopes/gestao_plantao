<script>

/* =========================
   SUPABASE CONFIG
========================= */

const SUPABASE_URL = "sb_publishable_NeVuFb5qFM0b4hPkmVpbIg_BjF0GZzd";
const SUPABASE_KEY = "sb_secret_E5tSQmqv_W9tjzdaccvBxQ_QuHXb22V";

const supabase = window.supabase.createClient(
  SUPABASE_URL,
  SUPABASE_KEY
);

/* =========================
   STATE
========================= */

let pacientes = [];
let editingId = null;
const alarmTimers = {};
let blinkInterval = null;
let realtimeChannel = null;

const $ = (id) => document.getElementById(id);

function nowISO(){ return new Date().toISOString(); }
function hhmm(d){ return d.toLocaleTimeString([], {hour:"2-digit", minute:"2-digit"}); }

/* =========================
   DATABASE
========================= */

async function carregarPacientes(){

  const { data, error } = await supabase
    .from("pacientes")
    .select("*")
    .order("created_at",{ascending:false});

  if(error){
    console.error(error);
    return;
  }

  pacientes = (data || []).map(p => ({
    id: p.id,
    ...p.dados_json,
    created_at: p.created_at,
    alta: p.alta,
    alta_at: p.alta_at,
    prox: p.dados_json?.prox
  }));

  render();
}

async function salvarPacienteBanco(p){

  if(p.id){

    const { error } = await supabase
      .from("pacientes")
      .update({
        dados_json: p,
        alta: p.alta,
        alta_at: p.alta_at
      })
      .eq("id",p.id);

    if(error) console.error(error);

  }else{

    const { data, error } = await supabase
      .from("pacientes")
      .insert([{
        name: p.nome,
        hd: p.hd,
        dados_json: p,
        alta:false
      }])
      .select();

    if(error){
      console.error(error);
      return;
    }

    p.id = data?.[0]?.id;
  }
}

async function deletarPacienteBanco(id){
  await supabase.from("pacientes").delete().eq("id",id);
}

async function darAltaBanco(id){
  await supabase
    .from("pacientes")
    .update({
      alta:true,
      alta_at:nowISO()
    })
    .eq("id",id);
}

/* =========================
   CRUD
========================= */

async function addOrUpdatePaciente(){

  const base = readFormToPatientBase();

  if(editingId){

    const p = pacientes.find(x=>x.id===editingId);
    if(!p) return;

    Object.assign(p,base);
    p.updated_at = nowISO();

    await salvarPacienteBanco(p);

    editingId=null;
    updateEditUI();
    clearFormOnly();
    await carregarPacientes();
    return;
  }

  const created = nowISO();

  const novo = {
    ...base,
    created_at:created,
    historico:[],
    alertando:false,
    alta:false,
    alta_at:null
  };

  const mins = minutosReav(novo);
  novo.prox = new Date(Date.now()+mins*60000).toISOString();

  await salvarPacienteBanco(novo);

  clearFormOnly();
  await carregarPacientes();
}

async function removePaciente(id){
  stopAlarm(id);
  await deletarPacienteBanco(id);
  await carregarPacientes();
}

async function darAlta(id){
  stopAlarm(id);
  await darAltaBanco(id);
  await carregarPacientes();
}

/* =========================
   REALTIME
========================= */

function initRealtime(){

  if(realtimeChannel) return;

  realtimeChannel = supabase
    .channel("realtime")
    .on("postgres_changes",
      { event:"*", schema:"public", table:"pacientes" },
      ()=> carregarPacientes()
    )
    .subscribe();
}

/* =========================
   BOOT
========================= */

initRealtime();
carregarPacientes();
setInterval(render,1000);

</script>
