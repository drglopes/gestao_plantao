<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>REAV SMART</title>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#0f172a;
  --card:#1e293b;
  --text:#e2e8f0;
  --muted:#94a3b8;
  --btn:#2563eb;
  --danger:#dc2626;
  --success:#16a34a;
  --border:#334155;
}

body{
  font-family:'Inter',sans-serif;
  background:var(--bg);
  color:var(--text);
  padding:20px;
  margin:0;
}

.card{
  background:var(--card);
  padding:15px;
  border-radius:12px;
  margin-bottom:15px;
  border:1px solid var(--border);
}

input, textarea, select{
  width:100%;
  margin:6px 0;
  padding:10px;
  background:#0f172a;
  color:var(--text);
  border:1px solid var(--border);
  border-radius:10px;
}

textarea{ min-height:80px; }

button{
  padding:10px;
  margin:5px 5px 5px 0;
  cursor:pointer;
  border:none;
  border-radius:8px;
  font-weight:600;
}

button.primary{ background:var(--btn); color:white; }
button.danger{ background:var(--danger); color:white; }
button.success{ background:var(--success); color:white; }

.checklist{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
  gap:8px;
  margin-top:10px;
}

.checklist label{
  background:#0f172a;
  border:1px solid var(--border);
  padding:8px;
  border-radius:8px;
  cursor:pointer;
  display:flex;
  align-items:center;
  gap:6px;
}

.alta{
  text-decoration:line-through;
  opacity:.5;
}
</style>
</head>

<body>

<h2>REAV SMART</h2>

<div class="card">

<input id="qp" placeholder="Queixa principal">
<textarea id="hda" placeholder="HDA"></textarea>

<textarea id="ant">
Comorbidades:
MUC:
Alergia:
Cirurgias prévias:
</textarea>

<textarea id="sv">
FC:  bpm | PA:  mmHg | SatO2:  % | FR:  irpm
</textarea>

<textarea id="ef">GERAL: BOM ESTADO GERAL, LÚCIDO, ORIENTADO, HIDRATADO, CORADO, AFEBRIL.
AR: MV PRESENTE BILATERALMENTE, SEM RUÍDOS ADVENTÍCIOS.
ACV: RCR EM 2T, SEM SOPROS.
ABD: PLANO, FLÁCIDO, INDOLOR.
NEURO: SEM DÉFICITS FOCAIS.</textarea>

<textarea id="hd" placeholder="Hipótese diagnóstica"></textarea>

<h4>Conduta</h4>
<div class="checklist">
<label><input type="checkbox" value="1"> Sintomáticos</label>
<label><input type="checkbox" value="2"> Exames laboratoriais</label>
<label><input type="checkbox" value="3"> Exames de imagem</label>
<label><input type="checkbox" value="4"> Reavaliação</label>
<label><input type="checkbox" value="5"> Internação</label>
<label><input type="checkbox" value="6"> Alta após atendimento</label>
<label><input type="checkbox" value="7"> Prescrição domiciliar</label>
<label><input type="checkbox" value="8"> Encaminhamento</label>
</div>

<select id="cor">
<option value="red">🔴 10 min</option>
<option value="orange">🟠 30 min</option>
<option value="yellow" selected>🟡 60 min</option>
<option value="green">🟢 120 min</option>
</select>

<button class="primary" onclick="addPaciente()">Salvar</button>

</div>

<div id="lista"></div>

<script>

const SUPABASE_URL = "https://qrvlpupxzvqvwcgwwamr.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFydmxwdXB4enZxdndjZ3d3YW1yIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIzNTE1NjUsImV4cCI6MjA4NzkyNzU2NX0.1k1P_IviJLaHvBK79jpUvm1uTrcLY01umYJsGerLq2Y";
const { createClient } = supabase;
const db = createClient(SUPABASE_URL, SUPABASE_KEY);

let pacientes = [];

function intervaloPorCor(c){
  if(c==="red") return 10;
  if(c==="orange") return 30;
  if(c==="yellow") return 60;
  if(c==="green") return 120;
  return 60;
}

async function carregar(){
  const { data } = await db
    .from("pacientes")
    .select("*")
    .order("created_at",{ascending:false});

  pacientes = data || [];
  render();
}

async function salvarNovo(p){
  const { data } = await db
    .from("pacientes")
    .insert([{ dados_json:p }])
    .select();

  return data[0].id;
}

async function atualizarExistente(id, obj){
  await db
    .from("pacientes")
    .update({ dados_json: obj })
    .eq("id", id);
}

async function deletar(id){
  await db.from("pacientes").delete().eq("id", id);
  carregar();
}

async function addPaciente(){

  const condutaSelecionada = [...document.querySelectorAll(".checklist input:checked")]
    .map(c=>parseInt(c.value))
    .sort((a,b)=>a-b);

  const novo = {
    nome: qp.value || "SEM QP",
    qp: qp.value,
    hda: hda.value,
    antecedentes: ant.value,
    sv: sv.value,
    ef: ef.value,
    hd: hd.value,
    conduta: condutaSelecionada,
    cor: cor.value,
    created_at: new Date().toISOString(),
    prox: new Date(Date.now()+intervaloPorCor(cor.value)*60000).toISOString(),
    alta:false
  };

  await salvarNovo(novo);
  carregar();
}

async function darAlta(id){
  const registro = pacientes.find(p=>p.id===id);
  if(!registro) return;

  registro.dados_json.alta = true;

  await atualizarExistente(id, registro.dados_json);
  carregar();
}

function tocarAlarme(){
  const audio = new Audio("https://actions.google.com/sounds/v1/alarms/beep_short.ogg");
  audio.play();
}

function exportar(id){

  const registro = pacientes.find(p=>p.id===id);
  if(!registro) return;

  const o = registro.dados_json;

  const texto = `#ANAMNESE
QP: ${o.qp}

HDA:
${o.hda}

---
#ANTECEDENTES
${o.antecedentes}

---
#SINAIS VITAIS
${o.sv}

---
#EXAME FÍSICO
${o.ef}

---
#HIPÓTESE DIAGNÓSTICA
${o.hd}

---
#CONDUTA
${(o.conduta||[]).join(", ")}`;

  try {
    navigator.clipboard.writeText(texto);
    alert("Copiado para área de transferência.");
  } catch {
    prompt("Copie manualmente:", texto);
  }
}

function render(){

  const div = document.getElementById("lista");
  div.innerHTML="";

  pacientes.forEach(p=>{

    const obj = p.dados_json;
    const atrasado = new Date(obj.prox) <= new Date() && !obj.alta;

    if(atrasado) tocarAlarme();

    const card = document.createElement("div");
    card.className="card";
    if(obj.alta) card.classList.add("alta");

    card.innerHTML = `
      <b>${obj.nome}</b><br>
      Próx reav: ${new Date(obj.prox).toLocaleTimeString()}<br><br>
      <button class="success" onclick="exportar('${p.id}')">Exportar</button>
      <button onclick="darAlta('${p.id}')">ALTA</button>
      <button class="danger" onclick="deletar('${p.id}')">DELETAR</button>
    `;

    div.appendChild(card);
  });
}

db.channel("realtime")
  .on("postgres_changes",
    { event:"*", schema:"public", table:"pacientes" },
    ()=> carregar()
  )
  .subscribe();

carregar();
setInterval(render,10000);

</script>

</body>
</html>
