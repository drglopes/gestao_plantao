<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>REAV SMART</title>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#0f172a;
  --card:#1e293b;
  --text:#e2e8f0;
  --muted:#94a3b8;
  --btn:#2563eb;
  --danger:#dc2626;
  --border:#334155;
}

body{
  font-family:'Inter',sans-serif;
  background:var(--bg);
  color:var(--text);
  padding:20px;
  margin:0;
}

.card{
  background:var(--card);
  padding:15px;
  border-radius:12px;
  margin-bottom:15px;
  border:1px solid var(--border);
}

input, textarea, select{
  width:100%;
  margin:6px 0;
  padding:10px;
  background:#0f172a;
  color:var(--text);
  border:1px solid var(--border);
  border-radius:10px;
}

textarea{
  min-height:80px;
}

button{
  padding:8px 12px;
  margin:4px 4px 4px 0;
  cursor:pointer;
  border:none;
  border-radius:8px;
  background:var(--btn);
  color:white;
}

button.danger{
  background:var(--danger);
}

.export-box{
  margin-top:10px;
  height:250px;
  background:#0f172a;
  color:#e2e8f0;
  border:1px solid var(--border);
  border-radius:10px;
  padding:10px;
  font-family:monospace;
}
</style>
</head>

<body>

<h2>REAV SMART</h2>

<div class="card">
  <input id="qp" placeholder="Queixa principal">
  <textarea id="hda" placeholder="HDA"></textarea>

  <!-- NOVO CAMPO EXAME FÍSICO -->
  <textarea id="ef">GERAL: BOM ESTADO GERAL, LÚCIDO, ORIENTADO, HIDRATADO, CORADO, AFEBRIL.
AR: MV PRESENTE BILATERALMENTE, SEM RUÍDOS ADVENTÍCIOS.
ACV: RCR EM 2T, SEM SOPROS.
ABD: PLANO, FLÁCIDO, INDOLOR.
NEURO: SEM DÉFICITS FOCAIS.</textarea>

  <textarea id="hd" placeholder="Hipótese diagnóstica"></textarea>

  <select id="cor">
    <option value="red">🔴 10 min</option>
    <option value="orange">🟠 30 min</option>
    <option value="yellow" selected>🟡 60 min</option>
    <option value="green">🟢 120 min</option>
  </select>

  <button onclick="addOrUpdatePaciente()">Salvar</button>
  <button onclick="exportarFormulario()">Exportar Texto</button>
</div>

<div id="lista"></div>

<textarea id="exportBox" class="export-box" style="display:none;"></textarea>

<script>

/* =========================
   SUPABASE CONFIG
========================= */

const SUPABASE_URL = "https://qrvlpupxzvqvwcgwwamr.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFydmxwdXB4enZxdndjZ3d3YW1yIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIzNTE1NjUsImV4cCI6MjA4NzkyNzU2NX0.1k1P_IviJLaHvBK79jpUvm1uTrcLY01umYJsGerLq2Y";

const { createClient } = supabase;
const supabaseClient = createClient(SUPABASE_URL, SUPABASE_KEY);

/* =========================
   STATE
========================= */

let pacientes = [];
let realtimeChannel = null;

function nowISO(){ return new Date().toISOString(); }

function intervaloPorCor(c){
  if(c==="red") return 10;
  if(c==="orange") return 30;
  if(c==="yellow") return 60;
  if(c==="green") return 120;
  return 60;
}

/* =========================
   DATABASE
========================= */

async function carregarPacientes(){

  const { data } = await supabaseClient
    .from("pacientes")
    .select("*")
    .order("created_at",{ascending:false});

  pacientes = data || [];
  render();
}

async function salvarPacienteBanco(p){

  if(p.id){

    await supabaseClient
      .from("pacientes")
      .update({ dados_json: p })
      .eq("id",p.id);

  }else{

    const { data } = await supabaseClient
      .from("pacientes")
      .insert([{ dados_json: p }])
      .select();

    p.id = data?.[0]?.id;
  }
}

/* =========================
   CRUD
========================= */

async function addOrUpdatePaciente(){

  const nome = document.getElementById("qp").value.trim() || "SEM QP";
  const hda = document.getElementById("hda").value.trim();
  const ef = document.getElementById("ef").value.trim();
  const hd = document.getElementById("hd").value.trim();
  const cor = document.getElementById("cor").value;

  const novo = {
    nome,
    qp:nome,
    hda,
    ef,
    hd,
    cor,
    created_at: nowISO(),
    prox: new Date(Date.now() + intervaloPorCor(cor)*60000).toISOString()
  };

  await salvarPacienteBanco(novo);
  limparForm();
  await carregarPacientes();
}

function limparForm(){
  document.getElementById("qp").value="";
  document.getElementById("hda").value="";
  document.getElementById("hd").value="";
}

/* =========================
   EXPORT PADRÃO
========================= */

function exportarFormulario(){

  const qp = document.getElementById("qp").value.trim();
  const hda = document.getElementById("hda").value.trim();
  const ef = document.getElementById("ef").value.trim();
  const hd = document.getElementById("hd").value.trim();

  const texto = `#ANAMNESE
QUEIXA PRINCIPAL: ${qp}

HDA:
${hda}

---
#EXAME FÍSICO
${ef}

---
#HIPÓTESE DIAGNÓSTICA
${hd}
`;

  const box = document.getElementById("exportBox");
  box.style.display="block";
  box.value = texto;
  box.select();
}

/* =========================
   RENDER
========================= */

function render(){

  const div = document.getElementById("lista");
  div.innerHTML="";

  pacientes.forEach(p=>{

    const obj = p.dados_json || p;
    const prox = new Date(obj.prox);

    const card = document.createElement("div");
    card.className="card";

    card.innerHTML = `
      <b>${obj.nome}</b><br>
      HD: ${obj.hd || "-"}<br>
      Próx reav: ${prox.toLocaleTimeString()}<br>
      <button class="danger" onclick="removerPaciente('${p.id}')">Remover</button>
    `;

    div.appendChild(card);
  });
}

async function removerPaciente(id){
  await supabaseClient.from("pacientes").delete().eq("id",id);
  await carregarPacientes();
}

/* =========================
   REALTIME
========================= */

function initRealtime(){

  if(realtimeChannel) return;

  realtimeChannel = supabaseClient
    .channel("realtime")
    .on("postgres_changes",
      { event:"*", schema:"public", table:"pacientes" },
      ()=> carregarPacientes()
    )
    .subscribe();
}

/* =========================
   BOOT
========================= */

initRealtime();
carregarPacientes();

</script>

</body>
</html>
